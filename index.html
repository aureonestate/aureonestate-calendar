<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aureon Estate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            min-height: 100vh;
        }

        /* -- Top bar -- */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2.5rem;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .brand {
            font-family: 'Instrument Serif', serif;
            font-size: 1.35rem;
            color: #1a1a1a;
            letter-spacing: -0.01em;
        }

        .nav-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e8a0a0;
            display: inline-block;
            animation: pulse 2.5s ease-in-out infinite;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: #999;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* -- Hero -- */
        .hero {
            padding: 8rem 2.5rem 3rem;
            max-width: 880px;
            margin: 0 auto;
        }

        .hero h1 {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(2.2rem, 5vw, 3.2rem);
            font-weight: 400;
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
        }

        .hero h1 span {
            color: #d4908f;
        }

        .hero p {
            font-size: 0.95rem;
            color: #888;
            max-width: 420px;
            line-height: 1.6;
        }

        /* -- Property section -- */
        .property-section {
            max-width: 880px;
            margin: 0 auto;
            padding: 0 2.5rem 4rem;
        }

        .property-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .property-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, #f2d5d5, #e8a0a0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .property-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #bbb;
            margin-bottom: 0.15rem;
        }

        .property-name {
            font-family: 'Instrument Serif', serif;
            font-size: 1.3rem;
            letter-spacing: -0.01em;
        }

        /* -- Calendar wrapper -- */
        .calendar-wrap {
            border: 1px solid #f0ecec;
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 4px 24px rgba(0,0,0,0.04);
        }

        .calendar-wrap .calendarWidget {
            width: 100%;
        }

        /* Tame the Smoobu "Powered by" link */
        .calendar-wrap a[href*="smoobu"] {
            opacity: 0.3;
            font-size: 0.7rem;
        }

        /* -- Legend -- */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 1.5rem;
            margin-bottom: 1rem;
            padding: 0 0.25rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            font-size: 0.8rem;
            color: #999;
            white-space: nowrap;
        }

        /* -- Smoobu widget overrides -- */
        /* Current day highlight: warm tone instead of cyan */
        .calendar-wrap td.today,
        .calendar-wrap td.active,
        .calendar-wrap .today,
        .calendar-wrap td[style*="border-color: cyan"],
        .calendar-wrap td[style*="border-color: aqua"] {
            border-color: #d4908f !important;
            outline-color: #d4908f !important;
        }

        /* Subtle grid lines between day cells */
        .calendar-wrap td {
            border: 1px solid rgba(0,0,0,0.05) !important;
        }

        .legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }

        .legend-swatch.booked {
            background: linear-gradient(135deg, #f2c4c4, #e8a0a0);
        }

        .legend-swatch.available {
            background: #fff;
            border: 1.5px solid #ddd;
        }

        .legend-swatch.checkin {
            background: linear-gradient(to bottom right, #fff 50%, #e8a0a0 50%);
            border: 1.5px solid #ddd;
        }

        .legend-swatch.checkout {
            background: linear-gradient(to bottom right, #e8a0a0 50%, #fff 50%);
            border: 1.5px solid #ddd;
        }

        /* -- Footer -- */
        footer {
            text-align: center;
            padding: 3rem 1rem;
            font-size: 0.75rem;
            color: #ccc;
            border-top: 1px solid #f5f2f2;
        }

        /* -- Mobile -- */
        @media (max-width: 640px) {
            nav { padding: 1rem 1.25rem; }
            .hero { padding: 6.5rem 1.25rem 2rem; }
            .property-section { padding: 0 1.25rem 3rem; }
            .legend { gap: 1rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="brand">Aureon Estate</div>
        <div class="nav-right">
            <span class="nav-dot"></span>
            Aggiornato in tempo reale
        </div>
    </nav>

    <section class="property-section" style="padding-top: 6rem;">
        <div class="property-header">
            <div>
                <div class="property-label">Proprietà</div>
                <div class="property-name">Via Siracusa 6 - III Piano</div>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-swatch booked"></div>
                Prenotato
            </div>
            <div class="legend-item">
                <div class="legend-swatch available"></div>
                Disponibile
            </div>
            <div class="legend-item">
                <div class="legend-swatch checkin"></div>
                Check-in
            </div>
            <div class="legend-item">
                <div class="legend-swatch checkout"></div>
                Check-out
            </div>
        </div>

        <div class="calendar-wrap">
            <!-- Smoobu Calendar Widget -->
            <div id="smoobuApartment3184747it" class="calendarWidget">
                <div class="calendarContent"
                    data-load-calendar-url="https://login.smoobu.com/it/cockpit/widget/single-calendar/3184747"
                    data-verification="a307632f384ee7e3357a96fd4c4952f14550b718b281aeb29abca0547b52a41c"
                    data-baseUrl="https://login.smoobu.com"
                    data-disable-css="false">
                </div>
                <script type="text/javascript" src="https://login.smoobu.com/js/Apartment/CalendarWidget.js"></script>
            </div>
        </div>
    </section>

    <!--
        AGGIUNGERE ALTRE PROPRIETÀ:
        Copia l'intero <section class="property-section"> qui sopra,
        sostituisci il nome e il widget embed code di Smoobu.
    -->

    <footer>
        Aureon Estate &copy; 2026
    </footer>

</body>
</html>
